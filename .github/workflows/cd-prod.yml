name: CD — Production

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"   # semver tags only: v1.2.3
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Exact image tag to deploy (e.g. v1.2.3 or a git SHA)"
        required: true

concurrency:
  group: cd-production
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
  IMAGE_TAG: ${{ github.event.inputs.image_tag || github.ref_name }}

permissions:
  id-token: write
  contents: read

jobs:
  # ── Build & push images ───────────────────────────────────────────────────────
  build-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ env.IMAGE_TAG }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_PROD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.ECR_REGISTRY }}/vidshield-backend:${{ env.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/vidshield-backend:prod-latest

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=https://app.vidshield.ai
            NEXT_PUBLIC_WS_URL=https://app.vidshield.ai
            NEXT_PUBLIC_APP_ENV=production
            NEXT_PUBLIC_MOCK_API=false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.ECR_REGISTRY }}/vidshield-frontend:${{ env.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/vidshield-frontend:prod-latest

  # ── Terraform apply (requires manual approval via GitHub Environment) ─────────
  terraform-prod:
    name: Terraform Apply — Production
    runs-on: ubuntu-latest
    needs: build-push
    environment: production   # GitHub environment with required_reviewers configured

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_PROD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.x"

      - name: Terraform init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET_PROD }}" \
            -backend-config="key=envs/prod/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}"

      - name: Terraform plan
        working-directory: terraform
        run: |
          terraform plan \
            -var-file=environments/prod.tfvars \
            -var="aws_account_id=${{ secrets.AWS_ACCOUNT_ID }}" \
            -var="ecr_backend_image=${{ env.ECR_REGISTRY }}/vidshield-backend:${{ needs.build-push.outputs.image_tag }}" \
            -var="ecr_frontend_image=${{ env.ECR_REGISTRY }}/vidshield-frontend:${{ needs.build-push.outputs.image_tag }}" \
            -var="db_secret_arn=${{ secrets.DB_SECRET_ARN_PROD }}" \
            -var="redis_secret_arn=${{ secrets.REDIS_SECRET_ARN_PROD }}" \
            -var="secret_key_arn=${{ secrets.SECRET_KEY_ARN_PROD }}" \
            -var="openai_api_key_arn=${{ secrets.OPENAI_API_KEY_ARN }}" \
            -var="pinecone_api_key_arn=${{ secrets.PINECONE_API_KEY_ARN }}" \
            -var="db_password_secret_arn=${{ secrets.DB_PASSWORD_SECRET_ARN_PROD }}" \
            -var="certificate_arn=${{ secrets.ACM_CERT_ARN_PROD }}" \
            -var="domain_aliases=[\"app.vidshield.ai\"]" \
            -out=tfplan

      - name: Terraform apply
        working-directory: terraform
        run: terraform apply -auto-approve tfplan

  # ── Deploy ECS services (rolling, with circuit breaker) ───────────────────────
  deploy-ecs:
    name: Deploy ECS — Production
    runs-on: ubuntu-latest
    needs: terraform-prod
    environment: production

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_PROD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Force new deployment — API
        run: |
          aws ecs update-service \
            --cluster vidshield-prod-cluster \
            --service vidshield-prod-api \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Force new deployment — Worker
        run: |
          aws ecs update-service \
            --cluster vidshield-prod-cluster \
            --service vidshield-prod-worker \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Force new deployment — Frontend
        run: |
          aws ecs update-service \
            --cluster vidshield-prod-cluster \
            --service vidshield-prod-frontend \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Wait for API service stability
        run: |
          aws ecs wait services-stable \
            --cluster vidshield-prod-cluster \
            --services vidshield-prod-api \
            --region ${{ env.AWS_REGION }}

      - name: Production health check
        run: |
          curl --fail --retry 5 --retry-delay 15 \
            https://app.vidshield.ai/api/v1/health

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID_PROD }} \
            --paths "/*"
